<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; }
        .search { max-width: 500px; margin: 0 auto; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #e50914; border: none; color: white; cursor: pointer; }
        .recommendations { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .movie-card { background: #1f1f1f; padding: 15px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Movie Recommender</h1>
    </div>
    <div class="search">
        <input type="text" id="query" placeholder="Enter movie genre or title...">
        <button onclick="recommend()">Recommend</button>
    </div>
    <div id="recommendations" class="recommendations"></div>

    <script>
    // Load database from JSON file or localStorage
    let db = { movies: [], webseries: [] };
    
    async function loadDB() {
        try {
            const response = dbJson; // Paste full JSON here or fetch('movies.json')
            db = response;
            saveDB(); // Backup to localStorage
        } catch(e) { loadFromStorage(); }
    }
    
    function saveDB() {
        localStorage.setItem('movieDB', JSON.stringify(db));
    }
    
    function loadFromStorage() {
        const saved = localStorage.getItem('movieDB');
        if(saved) db = JSON.parse(saved);
    }
    
    function searchAndShow(query) {
        const all = [...db.movies, ...db.webseries];
        const matches = all.filter(item => 
            item.name.toLowerCase().includes(query.toLowerCase()) ||
            item.genre.toLowerCase().includes(query.toLowerCase())
        );
        
        const container = document.getElementById('recommendations');
        container.innerHTML = matches.map(item => `
            <div class="movie-card" onclick="showPopup('${item.name}')">
                <h3>${item.name}</h3>
                <p>${item.genre} | ${item.rating}/10</p>
            </div>
        `).join('');
    }
    
    function showPopup(name) {
        const item = [...db.movies, ...db.webseries].find(m => m.name === name);
        const popup = `
            <div style="position:fixed;top:20%;left:20%;width:60%;background:#1f1f1f;padding:20px;border-radius:8px;z-index:1000;">
                <h2>${item.name}</h2>
                <p><strong>Genre:</strong> ${item.genre} | <strong>Rating:</strong> ${item.rating}</p>
                <p><strong>Description:</strong> ${item.description}</p>
                <p><strong>Actors:</strong> ${item.actors}</p>
                <button onclick="playTrailer('${item.trailer}')">▶ Trailer</button>
                <div id="admin-edit" style="margin-top:20px;">
                    <input id="new-rating" type="number" min="0" max="10" step="0.1" value="${item.rating}" />
                    <button onclick="updateRating('${name}')">Update Rating</button>
                    <button onclick="closePopup()">Close</button>
                </div>
            </div>
            <div onclick="closePopup()" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;"></div>
        `;
        document.body.insertAdjacentHTML('beforeend', popup);
    }
    
    function updateRating(name) {
        const newRating = document.getElementById('new-rating').value;
        [...db.movies, ...db.webseries].forEach(item => {
            if(item.name === name) item.rating = parseFloat(newRating);
        });
        saveDB();
        closePopup();
        alert('Rating updated!');
    }
    
    function playTrailer(url) {
        window.open(url, '_blank');
    }
    
    function closePopup() {
        document.querySelectorAll('[onclick="closePopup()"]').forEach(el => el.remove());
    }
    
    // Admin toggle (password: 'admin123')
    function toggleAdmin() {
        const pass = prompt('Admin Password:');
        if(pass === 'admin123') {
            document.querySelectorAll('#admin-edit').forEach(el => el.style.display = 'block');
        }
    }
    
    // Init
    loadDB();
    document.getElementById('query').addEventListener('keypress', e => {
        if(e.key === 'Enter') searchAndShow(e.target.value);
    });
</script>
<button onclick="toggleAdmin()" style="position:fixed;top:10px;right:10px;">Admin</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; }
        .search { max-width: 600px; margin: 0 auto 40px; display: flex; }
        #query { flex: 1; padding: 12px; border-radius: 4px 0 0 4px; border: none; font-size: 16px; }
        button { padding: 12px 24px; background: #e50914; border: none; color: white; border-radius: 0 4px 4px 0; cursor: pointer; font-size: 16px; }
        .recommendations { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .movie-card { background: #1f1f1f; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .movie-card:hover { transform: scale(1.05); }
        #admin-btn { position: fixed; top: 20px; right: 20px; background: #ff6b35; padding: 10px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; z-index: 100; }
        
        /* ENLARGED POPUP */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .popup-content { background: #1f1f1f; padding: 40px; border-radius: 16px; max-width: 95%; max-height: 95vh; width: 1200px; max-width: 1400px; overflow: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 20px; right: 25px; background: none; border: none; color: white; font-size: 32px; cursor: pointer; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .close-btn:hover { background: rgba(255,255,255,0.1); border-radius: 50%; }
        .popup-header { display: flex; gap: 30px; margin-bottom: 30px; }
        .main-info { flex: 1; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; padding-top: 30px; border-top: 2px solid #333; }
        .related-card { background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .related-card:hover { background: #e50914; transform: translateY(-5px); }
        .similarity { position: absolute; top: 5px; right: 10px; background: #4CAF50; color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .admin-panel { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <button id="admin-btn" onclick="toggleAdmin()">🔧 Admin</button>
    
    <div class="header">
        <h1>🎬 Movie & Series Recommender</h1>
        <p>Discover + Related Recommendations</p>
    </div>
    
    <div class="search">
        <input type="text" id="query" placeholder="Search movies, series, genres..." />
        <button onclick="handleSearch()">🔍 Search</button>
    </div>
    
    <div id="results" class="recommendations"></div>

    <script>
        const dbJson = {
            movies: [
                {name:"The Godfather", rating:9.2, description:"Mafia family power struggle.", actors:"Marlon Brando, Al Pacino", genre:"Drama", trailer:"https://youtube.com/watch?v=3K4v4xO9i0Q"},
                {name:"The Dark Knight", rating:9.0, description:"Batman vs Joker anarchy.", actors:"Christian Bale, Heath Ledger", genre:"Action", trailer:"https://youtube.com/watch?v=EXeTwQWrcwY"},
                {name:"Inception", rating:8.8, description:"Dream heist mission.", actors:"Leonardo DiCaprio", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=YoHD9XEInc0"},
                {name:"Pulp Fiction", rating:8.9, description:"Interconnected crime tales.", actors:"John Travolta, Samuel L Jackson", genre:"Thriller", trailer:"https://youtube.com/watch?v=s7EdQ4FqbhY"},
                {name:"Forrest Gump", rating:8.8, description:"American life journey.", actors:"Tom Hanks", genre:"Drama", trailer:"https://youtube.com/watch?v=bLvqoHBptjg"},
                {name:"The Matrix", rating:8.7, description:"Reality vs simulation.", actors:"Keanu Reeves", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=m8e-FF8MsqU"},
                {name:"Fight Club", rating:8.8, description:"Consumerism rebellion.", actors:"Brad Pitt, Edward Norton", genre:"Thriller", trailer:"https://youtube.com/watch?v=qtRKdVHc6-0"},
                {name:"Goodfellas", rating:8.7, description:"Mobster rise and fall.", actors:"Robert De Niro", genre:"Crime", trailer:"https://youtube.com/watch?v=qo5rRpNwuUw"},
                {name:"The Shawshank Redemption", rating:9.3, description:"Prison friendship.", actors:"Tim Robbins, Morgan Freeman", genre:"Drama", trailer:"https://youtube.com/watch?v=6hBblsQLYiA"},
                {name:"Schindler's List", rating:9.0, description:"Holocaust redemption.", actors:"Liam Neeson", genre:"Drama", trailer:"https://youtube.com/watch?v=UHe94MGp6tU"}
            ],
            webseries: [
                {name:"Breaking Bad", rating:9.5, description:"Chemistry teacher empire.", actors:"Bryan Cranston, Aaron Paul", genre:"Drama", trailer:"https://youtube.com/watch?v=H0GRzT2hW9I"},
                {name:"Game of Thrones", rating:9.2, description:"Thrones and dragons.", actors:"Emilia Clarke, Kit Harington", genre:"Drama", trailer:"https://youtube.com/watch?v=Gc-jDBCJOEo"},
                {name:"Stranger Things", rating:8.7, description:"80s supernatural.", actors:"Winona Ryder", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=zm4UDRFFz-0"},
                {name:"The Office", rating:9.0, description:"Workplace mockumentary.", actors:"Steve Carell", genre:"Comedy", trailer:"https://youtube.com/watch?v=D0ItbBojzNg"},
                {name:"The Boys", rating:8.7, description:"Corrupt superheroes.", actors:"Karl Urban", genre:"Action", trailer:"https://youtube.com/watch?v=cpAxFu0j1_Y"},
                {name:"Squid Game", rating:8.0, description:"Deadly competition.", actors:"Lee Jung-jae", genre:"Thriller", trailer:"https://youtube.com/watch?v=wnYXpB4J6JI"},
                {name:"Chernobyl", rating:9.4, description:"Nuclear disaster.", actors:"Jared Harris", genre:"Drama", trailer:"https://youtube.com/watch?v=s6N3aNWhQRY"},
                {name:"The Mandalorian", rating:8.7, description:"Baby Yoda adventures.", actors:"Pedro Pascal", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=6q4m4cW47OM"}
            ]
        };

        let db = { movies: [], webseries: [] };

        function initDB() {
            db = dbJson;
            localStorage.setItem('movieDB', JSON.stringify(db));
            showAll();
        }

        function handleSearch() {
            const query = document.getElementById('query').value.toLowerCase().trim();
            if (!query) return showAll();
            searchMovies(query);
        }

        function searchMovies(query) {
            const allItems = [...db.movies, ...db.webseries];
            const matches = allItems.filter(item =>
                item.name.toLowerCase().includes(query) ||
                item.genre.toLowerCase().includes(query) ||
                item.actors.toLowerCase().includes(query)
            );
            displayResults(matches.slice(0, 20));
        }

        function showAll() {
            const allItems = [...db.movies, ...db.webseries];
            displayResults(allItems.slice(0, 20));
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            if (!items.length) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#888;padding:40px;">No results found</div>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="movie-card" onclick="showPopup('${item.name.replace(/'/g, "\\'")}')">
                    <h3>${item.name}</h3>
                    <p>⭐ ${item.rating} | ${item.genre}</p>
                    <small>${item.actors.split(',')[0]}</small>
                </div>
            `).join('');
        }

        // SIMILARITY CALCULATOR (Genre + Actor match %)
        function calculateSimilarity(baseItem, compareItem) {
            let score = 0;
            if (baseItem.genre === compareItem.genre) score += 50;
            if (compareItem.actors.toLowerCase().includes(baseItem.actors.split(',')[0].toLowerCase()) || 
                baseItem.actors.toLowerCase().includes(compareItem.actors.split(',')[0].toLowerCase())) score += 30;
            if (compareItem.name.toLowerCase().includes(baseItem.genre.toLowerCase()) || 
                baseItem.name.toLowerCase().includes(compareItem.genre.toLowerCase())) score += 20;
            return Math.min(score, 100);
        }

        // ENLARGED POPUP WITH 18 RELATED
        function showPopup(name) {
            const item = [...db.movies, ...db.webseries].find(m => m.name === name);
            if (!item) return;

            closeAllPopups();

            // Get 18 most similar items
            const allItems = [...db.movies, ...db.webseries];
            const related = allItems
                .filter(x => x.name !== item.name)
                .map(x => ({...x, similarity: calculateSimilarity(item, x)}))
                .sort((a,b) => b.similarity - a.similarity)
                .slice(0, 18);

            const popupHTML = `
                <div class="popup-overlay" id="popup-overlay" onclick="closeAllPopups()">
                    <div class="popup-content" onclick="event.stopPropagation()">
                        <button class="close-btn" onclick="closeAllPopups()" title="Close">×</button>
                        
                        <div class="popup-header">
                            <div class="main-info">
                                <h1 style="margin:0 0 20px 0;font-size:2.5em;">${item.name}</h1>
                                <p style="font-size:1.3em;margin:5px 0;"><strong>⭐ ${item.rating}/10</strong> | ${item.genre}</p>
                                <p style="font-size:1.1em;"><strong>Cast:</strong> ${item.actors}</p>
                                <p style="font-size:1.1em;line-height:1.6;">${item.description}</p>
                                <button onclick="event.stopPropagation(); window.open('${item.trailer}', '_blank')" 
                                        style="background:#e50914;color:white;border:none;padding:15px 30px;border-radius:8px;cursor:pointer;font-size:1.1em;margin-top:20px;">
                                    ▶ Watch Trailer
                                </button>
                            </div>
                            <div class="admin-panel" id="admin-panel" style="display:none;">
                                <h4>🔧 Admin Edit</h4>
                                <label>New Rating: </label>
                                <input id="edit-rating" type="number" min="0" max="10" step="0.1" value="${item.rating}" style="width:100px;padding:6px;margin:10px 0;" />
                                <br>
                                <button onclick="saveRating('${name.replace(/'/g, "\\'")}', event)" style="background:#4CAF50;color:white;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;width:100%;">
                                    💾 Update Rating
                                </button>
                            </div>
                        </div>
                        
                        <div style="margin-top:40px;">
                            <h3 style="margin:0 0 20px 0;color:#e50914;">🔥 Similar Recommendations (${related.length}/18)</h3>
                            <div class="related-grid">
                                ${related.map(r => `
                                    <div class="related-card" onclick="showPopup('${r.name.replace(/'/g, "\\'")}')">
                                        <div class="similarity">${r.similarity}%</div>
                                        <h4 style="margin:10px 0 5px 0;font-size:1em;">${r.name}</h4>
                                        <p style="font-size:0.9em;color:#ccc;margin:0;">⭐ ${r.rating} | ${r.genre}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', popupHTML);
        }

        function closeAllPopups() {
            const overlay = document.getElementById('popup-overlay');
            if (overlay) overlay.remove();
        }

        function saveRating(name, event) {
            event.stopPropagation();
            const newRating = parseFloat(document.getElementById('edit-rating').value);
            const item = [...db.movies, ...db.webseries].find(m => m.name === name);
            if (item) {
                item.rating = newRating;
                document.getElementById('current-rating').textContent = newRating;
                localStorage.setItem('movieDB', JSON.stringify(db));
                alert('✅ Rating updated!');
            }
        }

        function toggleAdmin() {
            const pass = prompt('Admin Password:', '');
            if (pass === 'admin123') {
                document.getElementById('admin-panel').style.display = 'block';
                alert('🔧 Admin activated!');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('query').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleSearch();
            });
            initDB();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; }
        .search { max-width: 600px; margin: 0 auto 40px; display: flex; }
        #query { flex: 1; padding: 12px; border-radius: 4px 0 0 4px; border: none; font-size: 16px; }
        button { padding: 12px 24px; background: #e50914; border: none; color: white; border-radius: 0 4px 4px 0; cursor: pointer; font-size: 16px; }
        .recommendations { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .movie-card { background: #1f1f1f; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .movie-card:hover { transform: scale(1.05); }
        #admin-btn { position: fixed; top: 20px; right: 20px; background: #ff6b35; padding: 10px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <button id="admin-btn" onclick="toggleAdmin()">🔧 Admin</button>
    
    <div class="header">
        <h1>🎬 Movie & Series Recommender</h1>
        <p>Search 200+ iconic titles</p>
    </div>
    
    <div class="search">
        <input type="text" id="query" placeholder="Enter movie name, genre or actor..." />
        <button onclick="handleSearch()">🔍 Search</button>
    </div>
    
    <div id="results" class="recommendations">
        <div style="grid-column: 1/-1; text-align:center; color:#888; padding:40px;">Start searching for movies or series...</div>
    </div>

    <script>
        // SAMPLE DATABASE (expand as needed)
        const dbJson = {
            movies: [
                {name:"The Godfather", rating:9.2, description:"Mafia family saga.", actors:"Marlon Brando, Al Pacino", genre:"Drama", trailer:"https://youtube.com/watch?v=3K4v4xO9i0Q"},
                {name:"The Dark Knight", rating:9.0, description:"Batman vs Joker.", actors:"Christian Bale, Heath Ledger", genre:"Action", trailer:"https://youtube.com/watch?v=EXeTwQWrcwY"},
                {name:"Inception", rating:8.8, description:"Dream heist.", actors:"Leonardo DiCaprio", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=YoHD9XEInc0"},
                {name:"Pulp Fiction", rating:8.9, description:"Crime stories.", actors:"John Travolta", genre:"Thriller", trailer:"https://youtube.com/watch?v=s7EdQ4FqbhY"},
                {name:"Forrest Gump", rating:8.8, description:"Life journey.", actors:"Tom Hanks", genre:"Drama", trailer:"https://youtube.com/watch?v=bLvqoHBptjg"}
            ],
            webseries: [
                {name:"Breaking Bad", rating:9.5, description:"Teacher to kingpin.", actors:"Bryan Cranston", genre:"Drama", trailer:"https://youtube.com/watch?v=H0GRzT2hW9I"},
                {name:"Game of Thrones", rating:9.2, description:"Throne war.", actors:"Emilia Clarke", genre:"Drama", trailer:"https://youtube.com/watch?v=Gc-jDBCJOEo"},
                {name:"Stranger Things", rating:8.7, description:"Kids vs monsters.", actors:"Winona Ryder", genre:"Sci-Fi", trailer:"https://youtube.com/watch?v=zm4UDRFFz-0"},
                {name:"The Office", rating:9.0, description:"Office comedy.", actors:"Steve Carell", genre:"Comedy", trailer:"https://youtube.com/watch?v=D0ItbBojzNg"},
                {name:"The Boys", rating:8.7, description:"Corrupt superheroes.", actors:"Karl Urban", genre:"Action", trailer:"https://youtube.com/watch?v=cpAxFu0j1_Y"}
            ]
        };

        let db = { movies: [], webseries: [] };

        // Initialize database
        function initDB() {
            db = dbJson;
            localStorage.setItem('movieDB', JSON.stringify(db));
            showAll();
        }

        // Search function - FIXED
        function handleSearch() {
            const query = document.getElementById('query').value.toLowerCase().trim();
            if (!query) {
                showAll();
                return;
            }
            searchMovies(query);
        }

        function searchMovies(query) {
            const allItems = [...db.movies, ...db.webseries];
            const matches = allItems.filter(item =>
                item.name.toLowerCase().includes(query) ||
                item.genre.toLowerCase().includes(query) ||
                item.actors.toLowerCase().includes(query)
            );

            displayResults(matches.slice(0, 20));
        }

        function showAll() {
            const allItems = [...db.movies, ...db.webseries];
            displayResults(allItems.slice(0, 20));
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            if (items.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#888;padding:40px;">No results found</div>';
                return;
            }
            
            container.innerHTML = items.map(item => `
                <div class="movie-card" onclick="showPopup('${item.name.replace(/'/g, "\\'")}')">
                    <h3>${item.name}</h3>
                    <p>⭐ ${item.rating} | ${item.genre}</p>
                    <small>${item.actors.split(',')[0]}</small>
                </div>
            `).join('');
        }

        // Popup functions
        function showPopup(name) {
            const item = [...db.movies, ...db.webseries].find(m => m.name === name);
            if (!item) return;
            
            document.body.insertAdjacentHTML('beforeend', `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:999;display:flex;align-items:center;justify-content:center;" onclick="closePopup()">
                    <div style="background:#1f1f1f;padding:30px;border-radius:12px;max-width:600px;max-height:80vh;overflow:auto;margin:20px;" onclick="event.stopPropagation()">
                        <button onclick="closePopup()" style="position:absolute;top:15px;right:20px;background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button>
                        <h2>${item.name}</h2>
                        <div style="display:flex;gap:20px;">
                            <div style="flex:2;">
                                <p><strong>⭐ Rating:</strong> <span id="current-rating">${item.rating}</span>/10</p>
                                <p><strong>Genre:</strong> ${item.genre}</p>
                                <p><strong>Cast:</strong> ${item.actors}</p>
                                <p><strong>About:</strong> ${item.description}</p>
                                <button onclick="window.open('${item.trailer}', '_blank')" style="background:#e50914;color:white;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;margin-top:15px;">▶ Watch Trailer</button>
                            </div>
                            <div id="admin-panel" style="flex:1;display:none;padding:20px;background:#2a2a2a;border-radius:8px;">
                                <h4>Admin Edit</h4>
                                <label>Rating: </label>
                                <input id="edit-rating" type="number" min="0" max="10" step="0.1" value="${item.rating}" style="width:80px;padding:4px;" />
                                <br><br>
                                <button onclick="saveRating('${name.replace(/'/g, "\\'")}')" style="background:#4CAF50;color:white;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;">💾 Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            `);
        }

        function saveRating(name) {
            const newRating = parseFloat(document.getElementById('edit-rating').value);
            const item = [...db.movies, ...db.webseries].find(m => m.name === name);
            if (item) {
                item.rating = newRating;
                document.getElementById('current-rating').textContent = newRating;
                localStorage.setItem('movieDB', JSON.stringify(db));
                alert('✅ Rating saved!');
            }
        }

        function closePopup() {
            const overlay = document.querySelector('.movie-card ~ div[onclick="closePopup()"]');
            if (overlay) overlay.remove();
        }

        function toggleAdmin() {
            const pass = prompt('Admin Password:', '');
            if (pass === 'admin123') {
                const panels = document.querySelectorAll('#admin-panel');
                panels.forEach(panel => panel.style.display = 'block');
                alert('🔧 Admin mode ON');
            } else {
                alert('❌ Wrong password');
            }
        }

        // Enter key support
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('query').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleSearch();
            });
            initDB();
        });
    </script>
</body>
</html>
